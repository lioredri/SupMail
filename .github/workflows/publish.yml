name: Build and Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  build-and-publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # MOVE THIS UP: Define the version BEFORE you try to use it
      - name: Get version from Project
        id: get_version
        shell: pwsh
        run: |
          [xml]$project = Get-Content SupMail/SupMail.csproj
          $ver = $project.Project.PropertyGroup.Version
          if ($null -eq $ver) { $ver = "0.0" }
          
          if ("${{ github.ref_type }}" -eq "tag") {
              $finalVersion = "${{ github.ref_name }}"
          } else {
              $finalVersion = "v$ver.${{ github.run_number }}"
          }
          echo "version=$finalVersion" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore SupMail/SupMail.csproj -r win-x64

      - name: Build
        run: dotnet build SupMail/SupMail.csproj --configuration Release --no-restore -r win-x64 --no-self-contained

      - name: Publish
        run: dotnet publish SupMail/SupMail.csproj -c Release -o ./publish -r win-x64 --no-self-contained -p:PublishSingleFile=true -p:UseAppHost=true -p:DebugType=none -p:CopyOutputSymbolsToPublishDirectory=false

      # Use the version in the Release step
      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          files: ./publish/SupMail.exe
          body: |
            Automated release from master branch
            Commit: ${{ github.sha }}
            
            ## Requirements
            - Windows 10/11 (64-bit)
            - [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0/runtime)
            - Microsoft Outlook (2016 or later)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
