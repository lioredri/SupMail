name: Build and Publish

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  build-and-publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore SupMail/SupMail.csproj -r win-x64

      - name: Build
        run: dotnet build SupMail/SupMail.csproj --configuration Release --no-restore -r win-x64 --no-self-contained

      - name: Publish
        run: dotnet publish SupMail/SupMail.csproj -c Release -o ./publish -r win-x64 --no-self-contained -p:PublishSingleFile=true -p:UseAppHost=true

      - name: Create Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SupMail-Release-${{ github.sha }}
          path: ./publish/**/*
          retention-days: 90

      - name: Zip Release
        run: Compress-Archive -Path ./publish/* -DestinationPath SupMail-Release.zip

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=v0.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Create GitHub Release (on push to master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            Automated release from master branch
            Commit: ${{ github.sha }}
            
            ## Installation Instructions
            1. Download `SupMail-Release.zip`
            2. Extract and run `SupMail.exe`
            
            ## Requirements
            - Windows 10/11 (64-bit)
            - [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0/runtime) - Download "Desktop Runtime x64"
            - Microsoft Outlook (2016 or later)
          files: SupMail-Release.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
